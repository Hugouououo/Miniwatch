<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="img/icone.png" type="image/x-icon">
    <title>miniwatch</title>
</head>
<body class="tema-verde">
    <header>
        <div class="github">
            <a href="https://github.com/Hugouououo/Cronometro-Minimalista" target="_blank">
                <img src="img/github.png" alt="GitHub">
            </a>
        </div>
        <div class="seletor-tema">
            <button id="alternar-tema">
                <img src="img/tema.png" alt="Alternar tema de cores">    
            </button>
            
        </div>
    </header>
    <main>
        <div class="cronometro" id="cronometro">00:00</div>
        <div id="div-buttons">
            <button class="buttons" id="play">
                <img src="img/play.png" alt=""> 
                <br>Iniciar
            </button>
            <!--<button class="buttons" id="pause">Pausar</button>-->
            <button class="buttons" id="reset" hidden>
                <img src="img/reset.png" alt="">
                <br>Reiniciar
            </button>
        </div>

    </main>
</body>

<script type="module" src="js/src/script.js"></script>

</html>
